version: '3.8'

services:
  activemq:
    image: rmohr/activemq:latest
    container_name: activemq
    restart: unless-stopped

    ports:
      - "61616:61616"   # JMS
      - "8161:8161"     # Web Console

    environment:
      ACTIVEMQ_ADMIN_LOGIN: admin
      ACTIVEMQ_ADMIN_PASSWORD: admin

    volumes:
      - activemq-data:/opt/activemq/data

volumes:
  activemq-data: