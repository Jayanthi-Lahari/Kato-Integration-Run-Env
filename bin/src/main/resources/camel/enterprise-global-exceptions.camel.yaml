- onException:
    id: global-exception-handler
    exception:
      - java.lang.Exception
    handled:
      constant: true
    steps:
      - setBody:
          simple: |
            {
              "routeId":"${routeId}",
              "exchangeId":"${exchangeId}",
              "status":"FAILED",
              "errorMessage":"${exception.message}",
              "failedAt":"${date:now:yyyy-MM-dd HH:mm:ss}",
              "sourceFile":"${header.CamelFileName}"
            }
      - to:
          id: to-6920
          uri: activemq
          parameters:
            destinationName: Exceptions
