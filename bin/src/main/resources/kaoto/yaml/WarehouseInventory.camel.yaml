- onException:
    id: onException-global
    exception:
      - java.lang.Exception
    handled:
      constant: "true"
    steps:
      - setBody:
          simple: |
            {
              "status":"FAILED",
              "routeId":"${routeId}",
              "error":"${exception.message}",
              "payload":"${body}",
              "timestamp":"${date:now:yyyy-MM-dd HH:mm:ss}"
            }
      - to:
          uri: activemq
          parameters:
            destinationName: inventory.DLQ
- intercept:
    steps:
      - setHeader:
        name: auditTimestamp
        simple: ${date:now:yyyy-MM-dd HH:mm:ss}
      - setHeader:
          name: auditRoute
          simple: ${routeId}
      - setBody:
          simple: |
            {
              "timestamp": "${header.auditTimestamp}",
              "routeId": "${header.auditRoute}",
              "exchangeId": "${exchangeId}",
              "payload": ${body}
            }
      - to:
          id: to-4264
          uri: file
          parameters:
            directoryName: src/main/resources/audit
            fileName: audit-2026-06-05.json
            fileExist: Append
    id: intercept-1737
- route:
    id: warehouse-to-inventory
    from:
      uri: activemq
      parameters:
        destinationName: warehouse
      steps:
        - choice:
            when:
              - jsonpath: $[?(@.productId != null)]
                steps:
                  - step:
                      id: inventory-datamapper
                      steps:
                        - to:
                            uri: xslt-saxon
                            parameters:
                              resourceUri: classpath:xslt/inventory-mapping.xsl
                              failOnNullBody: false
                  - to:
                      uri: activemq
                      parameters:
                        destinationName: inventory
            otherwise:
              steps:
                - throwException:
                    exceptionType: java.lang.Exception
                    message: Invalid Inventory Payload convert xml