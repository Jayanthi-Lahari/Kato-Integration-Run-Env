- onException:
    id: global-exception
    description: Error Management System
    handled:
      constant: "true"
    exception:
      - java.lang.Exception
    steps:
      - setHeader:
          id: set-audit-failed
          description: Exception Audit Status
          name: auditEvent
          constant: FAILED
      - bean:
          id: build-exception-audit
          description: Exception Audit Builder
          ref: GlobalMnitor
          method: exceptionHandler
      - to:
          id: save-exception
          description: Exception Repository
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            database: kaoto
            collection: Exceptions
            operation: insert
- interceptSendToEndpoint:
    id: interceptSendToEndpoint-3096
    description: Capture All Target Endpoints
    uri: "*"
    steps:
      - setProperty:
          id: setProperty-3195
          name: currentEndpoint
          simple:
            expression: ${header.CamelInterceptedEndpoint}
      - bean:
          id: capture-target-endpoint
          ref: GlobalMnitor
          method: captureSendToEndpoint
- route:
    id: intercept Dynamic Document Approval Routing
    from:
      id: document-routing-slip-route
      uri: activemq
      parameters:
        destinationName: Request_In
      steps:
        - setHeaders:
            id: Audit-Management
            description: Audit MetaData
            headers:
              - name: documentType
                jsonpath:
                  expression: $.documentType
              - name: auditEvent
                constant:
                  expression: START
              - name: startTime
                simple:
                  expression: ${date:now:yyyy-MM-dd HH:mm:ss}
        - wireTap:
            id: Request-Audit
            uri: direct:Audit-Management
            description: Audit Management System
        - to:
            id: build-routing-slip
            uri: bean
            parameters:
              beanName: RoutingSlipBean
              method: buildSlip
            description: Build Dynamic Approval Path
        - routingSlip:
            id: routingSlip-1338
            simple:
              expression: ${header.routingSlip}
        - setHeaders:
            id: Audit-Management-1400
            description: Audit MetaData
            headers:
              - name: auditEvent
                constant:
                  expression: SUCCESS
        - wireTap:
            id: wireTap-2391-1380
            uri: direct:Audit-Management
      description: Document Approval
- route:
    id: manager-approval-route
    description: Manager Approval Process
    from:
      uri: direct
      parameters:
        name: manager
      steps:
        - setHeaders:
            id: manager-approval
            description: Manager Approval Details
            headers:
              - name: managerStatus
                constant: APPROVED
              - name: managerName
                constant: John Smith
              - name: managerApprovalTime
                simple:
                  expression: ${date:now:yyyy-MM-dd HH:mm:ss}
        - setBody:
            id: manager-body
            simple:
              expression: |
                {
                  "documentType":"${header.documentType}",
                  "managerStatus":"${header.managerStatus}",
                  "managerName":"${header.managerName}",
                  "managerApprovalTime":"${header.managerApprovalTime}",
                  "document":${body}
                }
- route:
    id: finance-approval-route
    description: Finance Approval Process
    from:
      uri: direct
      parameters:
        name: finance
      steps:
        - setHeaders:
            id: finance-approval
            description: Finance Approval Details
            headers:
              - name: financeStatus
                constant: VERIFIED
              - name: budgetCode
                constant: FIN-2026
              - name: financeApprovalTime
                simple:
                  expression: ${date:now:yyyy-MM-dd HH:mm:ss}
        - setBody:
            id: finance-body
            simple:
              expression: |
                {
                  "documentType":"${header.documentType}",
                  "managerStatus":"${header.managerStatus}",
                  "financeStatus":"${header.financeStatus}",
                  "budgetCode":"${header.budgetCode}",
                  "financeApprovalTime":"${header.financeApprovalTime}",
                  "document":${body}
                }
- route:
    from:
      uri: direct
      parameters:
        name: Audit-Management
      steps:
        - bean:
            id: build-audit
            description: Audit Document Generator
            ref: GlobalMnitor
            method: auditHandler
        - to:
            id: save-audit
            description: Audit Repository
            uri: mongodb
            parameters:
              connectionBean: mongoBean
              database: kaoto
              collection: Audit
              operation: insert
      id: Audit-Management
      description: Audit Route
    id: Audit Management system
- beans:
    - name: RoutingSlipBean
      type: com.bean.RoutingSlipBean
    - name: GlobalMnitor
      type: com.common.GlobalMnitor
