- onException:
    id: queue-exception-handler
    description: Handle ActiveMQ queue processing failures and runtime exceptions
    handled:
      constant: "true"
    exception:
      - java.lang.Exception
    steps:
      - bean:
          id: build-queue-exception
          description: Error Document
          method: exceptionHandler
          ref: GlobalMnitor
      - to:
          id: save-queue-exception-db
          description: Exceptions DB
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            collection: Exceptions
            database: kaoto
            operation: insert
- route:
    id: sales-queue-to-file-route
    description: Consume sales messages from ActiveMQ queue and generate monthly CSV file
    from:
      id: sales-Report-Genrator
      description: Sales-System_IN
      uri: activemq
      parameters:
        destinationName: Sales-System-In
      steps:
        - setHeaders:
            id: audit-header
            description: Start Event
            headers:
              - name: targetEndpoint
                simple:
                  expression: sales_${date:now:yyyy-MM}.csv
              - name: auditEvent
                constant:
                  expression: START
              - name: startTime
                simple:
                  expression: ${date:now:yyyy-MM-dd HH:mm:ss}
        - wireTap:
            id: tap-start-audit
            description: Audit
            uri: direct:Sales-Audit
        - unmarshal:
            id: xml-to-object
            jacksonXml: {}
            description: XML-Java-Conversion
        - setBody:
            id: convert-to-csv
            description: CSV Tranform
            simple:
              expression: ${body[saleId]}|${body[orderNumber]}|${body[customerNumber]}|${body[customerName]}|${body[saleDate]}|${body[amount]}|${body[currency]}\n
        - to:
            id: write-monthly-file
            description: Sales-Report-Out
            uri: file
            parameters:
              directoryName: src/main/resources/output/Monthly-Sales-Report
              fileName: sales_${date:now:yyyy-MM}.csv
              fileExist: Append
        - setHeaders:
            id: audit-success-header
            headers:
              - name: auditEvent
                simple:
                  expression: SUCCESS
              - name: targetEndpoint
                description: ""
                simple:
                  expression: ${header.CamelFileNameProduced}
            description: Success Event
        - wireTap:
            id: tap-success-audit
            description: Audit
            uri: direct:Sales-Audit
- route:
    id: audit-processing-route
    description: Central audit processor for queue-to-file integration flow
    from:
      id: audit-consumer
      description: Audit
      uri: direct
      parameters:
        name: Sales-Audit
      steps:
        - bean:
            id: build-audit-document
            description: Audit document
            method: auditHandler
            ref: GlobalMnitor
        - to:
            id: save-audit-mongo
            description: Store audit record in MongoDB Audit collection
            uri: mongodb
            parameters:
              connectionBean: mongoBean
              collection: Audit
              database: kaoto
              operation: save
- beans:
    - name: GlobalMnitor
      type: com.common.GlobalMnitor
