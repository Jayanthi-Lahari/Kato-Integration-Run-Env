- onException:
    id: global-exception-handler
    description: Exception handler
    steps:
      - setHeaders:
          id: exception-metadata
          description: metadata
          headers:
            - name: failedTime
              simple:
                expression: ${date:now:yyyy-MM-dd HH:mm:ssSS}
      - choice:
          id: exception-choice
          description: Target Path Check
          when:
            - id: directory-validation
              simple:
                expression: ${exception.message} contains 'Cannot store file'
              steps:
                - setHeader:
                    id: directory-error
                    description: Error Text
                    name: errorMessage
                    simple:
                      expression: Target directory path does not exist and
                        ${exception.message.replaceAll('\\','/')}
          otherwise:
            id: exception-default
            steps:
              - setHeader:
                  id: exception-message
                  description: Exception
                  name: errorMessage
                  simple:
                    expression: ${exception.message}
      - setBody:
          description: Exception Details
          simple:
            expression: >-
              {
                "routeId": "${routeId}",
                "exchangeId": "${exchangeId}",
                "startTime": "${header.startTime}",
                "endTime": "${date:now:yyyy-MM-dd HH:mm:ss}",
                "sourceEndpoint": "${header.CamelFileParent.replaceAll('\\','/')}",
                "failureEndpoint": "${exchangeProperty.CamelFailureEndpoint}",
                "fileName": "${header.CamelFileName}",
                "status": "FAILED",
                "exceptionName": "${exception.class.simpleName}",
                "errorMessage": "${header.errorMessage}"
              }
      - to:
          id: failure-notification
          description: Notification
          uri: bean
          parameters:
            beanName: notificationBean
            method: failureNotification
          disabled: false
      - convertBodyTo:
          id: exception-document
          description: Document Format
          type: org.bson.Document
      - to:
          id: exception-mongodb
          description: Exception Store
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            collection: Exceptions
            operation: insert
            database: kaoto
    handled:
      constant: "true"
    exception:
      - java.lang.Exception
      - java.io.FileNotFoundException
- route:
    id: file-processing-route
    description: Order Management
    from:
      id: file-consumer
      description: Order IN
      uri: file
      parameters:
        directoryName: src/main/resources/input/orders
        noop: false
        moveFailed: error/${file:name}
        includeExt: json
        move: success/${file:name}
      steps:
        - setHeaders:
            id: audit-metadata
            description: metadata
            headers:
              - name: exchangeId
                simple:
                  expression: ${exchangeId}
              - name: routeId
                simple:
                  expression: ${routeId}
              - name: startTime
                simple:
                  expression: ${date:now:yyyy-MM-dd HH:mm:ssSS}
        - to:
            id: output-directory
            description: Order OUT
            uri: file
            parameters:
              directoryName: src/main/resources/output/sample
              autoCreate: false
        - setHeader:
            id: Target Endpoint
            description: Target Endpoint
            name: targetEndpoint
            simple:
              expression: ${exchangeProperty.CamelToEndpoint}
        - wireTap:
            id: audit-wiretap
            description: Audit
            uri: direct:audit-route
- route:
    id: audit-processing-route
    description: Audit Management
    from:
      id: audit-consumer
      description: Audit
      uri: direct
      parameters:
        name: audit-route
      steps:
        - setBody:
            description: Audit Details
            simple:
              expression: >-
                {
                  "routeId": "${routeId}",
                  "exchangeId": "${exchangeId}",
                  "startTime": "${header.startTime}",
                  "endTime": "${date:now:yyyy-MM-dd HH:mm:ss}",
                  "sourceEndpoint": "${header.CamelFileParent.replaceAll('\\','/')}",
                  "targetEndpoint": "${header.targetEndpoint}",
                  "fileName": "${header.CamelFileName}",
                  "Folder": "${header.CamelFileNameProduced.replaceAll('\\','/')}",
                  "status": "SUCCESS"
                }
        - convertBodyTo:
            id: audit-document
            description: Document Format
            type: org.bson.Document
        - to:
            id: audit-mongodb
            description: Audit Stores
            uri: mongodb
            parameters:
              database: kaoto
              collection: Audit
              operation: insert
              connectionBean: mongoBean
