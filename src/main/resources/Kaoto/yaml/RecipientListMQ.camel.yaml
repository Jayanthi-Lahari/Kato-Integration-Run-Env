- onException:
    id: global-exception
    description: Error Management System
    handled:
      constant: "true"
    exception:
      - java.lang.Exception
    steps:
      - setHeader:
          id: set-audit-failed
          description: Exception Audit Status
          name: auditEvent
          constant: FAILED
      - bean:
          id: notify-failure
          description: Notification Service
          ref: mailNotificationBean
          method: globalNotification
      - to:
          id: recovery-queue
          description: Recovery Queue Service
          uri: activemq
          parameters:
            destinationName: MissingMessage_Q
      - bean:
          id: build-exception-audit
          description: Exception Audit Builder
          ref: GlobalMnitor
          method: exceptionHandler
      - to:
          id: save-exception
          description: Exception Repository
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            database: kaoto
            collection: Exceptions
            operation: insert
- route:
    id: order-recipientList-route
    description: Order Management System
    from:
      uri: activemq
      parameters:
        destinationName: Confrimed_Order_IN
      steps:
        - setHeaders:
            id: order-audit-header
            description: Order Audit Metadata
            headers:
              - name: auditEvent
                constant: ORDER_RECEIVED
              - name: startTime
                simple: ${date:now:yyyy-MM-dd HH:mm:ss}
        - wireTap:
            id: order-audit
            description: Audit Management System
            uri: direct:recipientList-Audit
        - recipientList:
            id: recipientList-6013
            constant:
              expression: activemq:Billing_Q,activemq:Inventory_Q,activemq:Shipping_Q
        - setHeader:
            id: success-audit-header
            name: targetEndpoint
            simple:
              expression: ${exchangeProperty.CamelToEndpoint}
            description: Transaction Success Audit
        - wireTap:
            id: order-audit-3577
            description: Audit Management System
            uri: direct:recipientList-Audit
      description: Confrimed_Order
- route:
    id: audit-route
    description: Enterprise Audit Management System
    from:
      uri: direct
      parameters:
        name: recipientList-Audit
      steps:
        - bean:
            id: build-audit
            description: Audit Document Generator
            ref: GlobalMnitor
            method: auditHandler
        - to:
            id: save-audit
            description: Audit Repository
            uri: mongodb
            parameters:
              connectionBean: mongoBean
              database: kaoto
              collection: Audit
              operation: insert
- beans:
    - name: GlobalMnitor
      type: com.common.GlobalMnitor
