- onException:
    id: global-exception
    description: Handle processing exceptions
    handled:
      constant: "true"
    exception:
      - java.lang.Exception
    steps:
      - bean:
          id: exception-handler
          ref: GlobalMnitor
          method: exceptionHandler
      - to:
          id: exception-db
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            database: kaoto
            collection: Exceptions
            operation: insert

- interceptFrom:
    id: start-audit
    description: Capture incoming request details
    uri: "activemq:*"
    steps:
      - bean:
          id: start-audit-bean
          ref: Intercept_Audit
          method: captureStartAudit
      - to:
          id: audit-db
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            database: kaoto
            collection: Audit
            operation: insert

- interceptSendToEndpoint:
    id: endpoint-interceptor
    description: Capture every outgoing endpoint
    uri: "activemq:*"
    steps:
      - bean:
          id: endpoint-monitor
          ref: Intercept_Audit
          method: captureSendToEndpoint

- onCompletion:
    id: completion-audit
    onCompleteOnly: true
    steps:
      - bean:
          ref: Monitor_Intercept
          method: auditHandler
      - to:
          uri: mongodb
          parameters:
            connectionBean: mongoBean
            database: kaoto
            collection: Audit
            operation: insert

- route:
    id: order-recipientList-Intercept-route
    description: Process confirmed orders using Recipient List
    from:
      uri: activemq
      parameters:
        destinationName: Confirmed_Order
      steps:
        - recipientList:
            id: distribute-order
            description: Send order to Billing, Inventory and Shipping
            constant:
              expression: activemq:Billing_Q,activemq:Inventory_Q,activemq:Shipping_Q

- beans:
    - name: Intercept_Audit
      type: com.common.Intercept_Audit
    - name: Monitor_Intercept
      type: com.common.Monitor_Intercept
    - name: GlobalMnitor
      type: com.common.GlobalMnitor